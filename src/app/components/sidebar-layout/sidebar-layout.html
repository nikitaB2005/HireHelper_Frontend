<div class="min-h-screen flex app-shell relative overflow-x-hidden">
  <aside class="w-64 flex flex-col shadow-2xl shrink-0 sticky top-0 h-screen sidebar-shell transition-all duration-300 ease-in-out z-40 bg-zinc-900/80 backdrop-blur-2xl border-r border-white/5"
    [ngClass]="{'-ml-64': !isSidebarOpen}">
    <div class="p-8 border-b border-white/5">
      <h1 class="text-2xl font-black tracking-tight text-amber-500 flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-amber-600 flex items-center justify-center text-white text-base shadow-lg shadow-amber-900/20">H</div>
        HireHelper
      </h1>
      <p class="text-[10px] mt-1.5 uppercase tracking-[0.3em] text-slate-500 font-bold">Workspace Hub</p>
    </div>

    <nav class="flex-1 p-5 space-y-2 overflow-y-auto custom-scrollbar">
      <a routerLink="/dashboard" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
        class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </a>

      <a routerLink="/feed" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
        class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
        Task Feed
      </a>

      <ng-container *ngIf="isEmployer">
        <a routerLink="/add-task" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
          class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Post Task
        </a>
        <a routerLink="/my-tasks" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
          class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          My Tasks
        </a>
        <a routerLink="/requests" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
          class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
          Requests
          <span *ngIf="unreadCount > 0" class="ml-auto w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.8)]"></span>
        </a>
      </ng-container>

      <ng-container *ngIf="isHelper">
        <a routerLink="/my-requests" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
          class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
          My Applications
        </a>
      </ng-container>

      <a (click)="viewNotifications()" class="nav-link flex items-center justify-between px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300 cursor-pointer">
        <div class="flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span>Notifications</span>
        </div>
        <span *ngIf="unreadCount > 0" class="bg-amber-600 text-white text-[10px] font-black px-2 py-0.5 rounded-lg shadow-lg shadow-amber-900/40">
          {{ unreadCount }}
        </span>
      </a>

      <a routerLink="/settings" routerLinkActive="!bg-amber-600 !text-white shadow-lg shadow-amber-900/20"
        class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl text-sm font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Account Settings
      </a>
    </nav>

    <div class="p-6 border-t border-white/5 space-y-4">
      <div class="flex items-center gap-4 p-3 rounded-2xl bg-white/5 border border-white/5 transition-all group cursor-pointer" (click)="openReviewsModal()">
        <div class="relative shrink-0" (click)="openImageModal(); $event.stopPropagation()">
          <img *ngIf="userProfilePicture" [src]="userProfilePicture" alt="Profile" class="w-10 h-10 rounded-xl object-cover border border-white/10 group-hover:border-amber-500/50 transition-colors" />
          <div *ngIf="!userProfilePicture" class="w-10 h-10 rounded-xl bg-amber-600 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-amber-900/20">
            {{ userName.charAt(0).toUpperCase() }}
          </div>
        </div>
        
        <div class="overflow-hidden flex-1">
          <p class="text-xs font-black text-white truncate group-hover:text-amber-500 transition-colors">
            {{ userName }}
            <span *ngIf="userRating" class="ml-1 text-amber-500">⭐ {{ userRating }}</span>
          </p>
          <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest truncate mt-0.5">{{ isEmployer ? 'Active Hirer' : 'Verified Helper' }}</p>
        </div>
      </div>

      <button type="button" (click)="logout()"
        class="w-full h-11 rounded-xl bg-white/5 border border-white/10 text-slate-400 text-xs font-black uppercase tracking-widest hover:bg-rose-600 hover:text-white hover:border-rose-600 transition-all flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>


  <!-- Sidebar Toggle Tab Button -->
  <button type="button" (click)="toggleSidebar()"
    class="fixed z-50 top-1/2 -translate-y-1/2 flex items-center justify-center w-6 h-12 bg-zinc-900/80 backdrop-blur-md border border-white/10 shadow-xl text-amber-500 hover:text-amber-400 transition-all duration-300 group focus:outline-none cursor-pointer rounded-r-lg border-l-0"
    [ngClass]="{
      'left-64': isSidebarOpen,
      'left-0': !isSidebarOpen
    }">
    <svg *ngIf="isSidebarOpen" class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    <svg *ngIf="!isSidebarOpen" class="w-4 h-4 transition-transform group-hover:translate-x-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>

  <main class="flex-1 h-screen overflow-y-auto content-shell transition-all duration-300 ease-in-out">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Simple Image Preview Modal -->
<div *ngIf="showImageModal" class="fixed inset-0 z-[200] bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 transition-all duration-300" (click)="closeImageModal()">
  <div class="relative max-w-3xl w-full flex flex-col items-center justify-center animate-in fade-in zoom-in-95 duration-200" (click)="$event.stopPropagation()">
    <img [src]="userProfilePicture" class="max-w-full max-h-[85vh] rounded-2xl shadow-2xl border-4 border-white/10" alt="Large profile preview" />
    <button (click)="closeImageModal()" class="absolute -top-12 right-0 text-white hover:text-slate-300 transition-colors flex items-center gap-2 font-semibold">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      Close
    </button>
  </div>
</div>

<app-profile-modal
  [isOpen]="showProfileModal"
  [userId]="currentUserId"
  [userName]="userName"
  [userRating]="userRating"
  [userProfilePicture]="userProfilePicture"
  (closeEvent)="closeReviewsModal()">
</app-profile-modal>
