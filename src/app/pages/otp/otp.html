<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 via-indigo-50 to-slate-100">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

    <div class="text-center mb-4 pb-4 relative">
      <h1 class="text-4xl font-black text-slate-900 tracking-tight">HireHelper</h1>
      <p class="text-slate-500 text-sm mt-2">Your trusted hiring platform</p>
      <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-16 h-0.5 rounded-full bg-gradient-to-r from-blue-500 to-emerald-400"></div>
    </div>

    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Verify Your Email</h2>
      <p class="text-gray-500 text-sm mt-1">We sent a 6-digit code to your email address</p>
    </div>

    <form (ngSubmit)="verify()" class="space-y-6">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 text-center">Enter Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="Your registered email"
          class="w-full h-12 border border-slate-300 rounded-xl px-4 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition text-center" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-3 text-center">Enter OTP Code</label>
        <div class="flex justify-center gap-3">
          <input #digit1Input type="text" name="digit1" [(ngModel)]="digit1" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, null, digit2Input)" (keydown.backspace)="moveToPrevious($event, null)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
          <input #digit2Input type="text" name="digit2" [(ngModel)]="digit2" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, digit1Input, digit3Input)" (keydown.backspace)="moveToPrevious($event, digit1Input)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
          <input #digit3Input type="text" name="digit3" [(ngModel)]="digit3" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, digit2Input, digit4Input)" (keydown.backspace)="moveToPrevious($event, digit2Input)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
          <input #digit4Input type="text" name="digit4" [(ngModel)]="digit4" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, digit3Input, digit5Input)" (keydown.backspace)="moveToPrevious($event, digit3Input)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
          <input #digit5Input type="text" name="digit5" [(ngModel)]="digit5" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, digit4Input, digit6Input)" (keydown.backspace)="moveToPrevious($event, digit4Input)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
          <input #digit6Input type="text" name="digit6" [(ngModel)]="digit6" maxlength="1" inputmode="numeric" pattern="[0-9]"
            (input)="moveToNext($event, digit5Input, null)" (keydown.backspace)="moveToPrevious($event, digit5Input)"
            (ngModelChange)="updateOtpValue()"
            class="w-12 h-14 border-2 border-slate-300 rounded-xl text-center text-xl font-bold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition" />
        </div>
      </div>

      <div class="text-center">
        <p class="text-sm text-slate-500 mb-2">
          <span *ngIf="timer > 0">Code expires in <span class="font-bold text-blue-600">{{ timer }}s</span></span>
          <span *ngIf="timer === 0" class="text-red-500 font-semibold">Code expired</span>
        </p>
        <button type="button" (click)="resendOtp()" [disabled]="timer > 0"
          class="text-blue-600 text-sm font-semibold hover:text-blue-700 hover:underline disabled:text-slate-400 disabled:no-underline disabled:cursor-not-allowed transition">
          Resend Code
        </button>
      </div>

      <div class="p-3 rounded-xl bg-red-50 text-red-700 text-sm font-medium text-center" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="otpValue.length < 6"
        class="w-full h-12 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-blue-200 hover:-translate-y-0.5 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
        <span>Verify &amp; Continue</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Wrong account? <a href="/login" class="text-blue-700 font-bold hover:underline">Back to Login</a>
    </p>
  </div>
</div>
