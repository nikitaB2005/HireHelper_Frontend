<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 via-indigo-50 to-slate-100">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

    <div class="text-center mb-6 pb-5 relative">
      <h1 class="text-4xl font-black text-slate-900 tracking-tight">HireHelper</h1>
      <p class="text-slate-500 text-sm mt-2">Reset your password</p>
      <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-16 h-0.5 rounded-full bg-gradient-to-r from-blue-500 to-emerald-400"></div>
    </div>

    <div *ngIf="step === 1" class="space-y-4">
      <h2 class="text-xl font-bold text-gray-900 text-center">Forgot Password</h2>
      <p class="text-gray-500 text-sm text-center">Enter your registered email to receive OTP</p>

      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        class="w-full h-12 border border-slate-300 rounded-xl px-4 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
      />

      <button
        type="button"
        (click)="requestOtp()"
        [disabled]="isSendingOtp"
        class="w-full h-12 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold text-sm disabled:opacity-50"
      >
        {{ isSendingOtp ? 'Sending OTP...' : 'Send OTP' }}
      </button>
    </div>

    <div *ngIf="step === 2" class="space-y-4">
      <h2 class="text-xl font-bold text-gray-900 text-center">Set New Password</h2>
      <p class="text-gray-500 text-sm text-center">Enter OTP and your new password</p>

      <input
        type="text"
        name="otp"
        [(ngModel)]="otp"
        maxlength="6"
        placeholder="Enter 6-digit OTP"
        class="w-full h-12 border border-slate-300 rounded-xl px-4 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
      />

      <div class="relative">
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="Enter new password"
          class="w-full h-12 border border-slate-300 rounded-xl px-4 pr-14 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
        />
        <button type="button" (click)="showNewPassword = !showNewPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold text-blue-700">
          {{ showNewPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <div class="relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm new password"
          class="w-full h-12 border border-slate-300 rounded-xl px-4 pr-14 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
        />
        <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold text-blue-700">
          {{ showConfirmPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <button
        type="button"
        (click)="resetPassword()"
        [disabled]="isResettingPassword"
        class="w-full h-12 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold text-sm disabled:opacity-50"
      >
        {{ isResettingPassword ? 'Updating Password...' : 'Reset Password' }}
      </button>

      <button type="button" (click)="step = 1" class="w-full text-sm text-blue-700 font-semibold hover:underline">
        Back to Email Step
      </button>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      Remembered password? <a routerLink="/login" class="text-blue-700 font-bold hover:underline">Back to Login</a>
    </p>
  </div>
</div>
